<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蛊真人资料库</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111;
            --text: #0f0;
            --text-secondary: #aaa;
            --border: #222;
            --input-bg: #1a1a1a;
            --accent: #0f0;
            --accent-dim: rgba(0,255,0,0.12);
            --shadow: 0 4px 16px rgba(0,255,0,0.06);
            --radius: 10px;
            --transition: 0.2s;
        }
        body.light {
            --bg: #f2f2f2;
            --card-bg: #fff;
            --text: #222;
            --text-secondary: #666;
            --border: #ddd;
            --input-bg: #fff;
            --accent: #0a0;
            --accent-dim: rgba(0,170,0,0.1);
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 70px;
        }
        #app { flex: 1; display: flex; flex-direction: column; max-width: 640px; margin: 0 auto; width: 100%; padding: 8px 10px; }
        .page { display: none; flex: 1; overflow-y: auto; animation: fadeIn 0.25s ease; }
        .page.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg);
            border-top: 1px solid var(--border); display: flex; justify-content: space-around;
            padding: 6px 0 env(safe-area-inset-bottom, 6px); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; color: var(--text-secondary);
            font-size: 12px; cursor: pointer; user-select: none; padding: 4px 10px; border-radius: 8px; transition: var(--transition);
        }
        .nav-item.active { color: var(--accent); background: var(--accent-dim); font-weight: bold; }
        .nav-item span { font-size: 20px; }

        input, textarea, select {
            width: 100%; margin: 6px 0; padding: 12px; background: var(--input-bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 6px var(--accent-dim); }
        select {
            appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230f0'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 12px center; background-size: 20px;
        }
        #preview-area {
            margin: 8px 0; text-align: center; border: 1px dashed var(--border); border-radius: 8px;
            padding: 12px; background: var(--bg); min-height: 70px; display: flex; align-items: center; justify-content: center;
        }
        #preview-area img { max-width: 100%; max-height: 200px; border-radius: 6px; }
        .placeholder { color: var(--text-secondary); font-size: 13px; }

        button {
            width: 100%; padding: 11px; background: var(--input-bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: var(--transition); margin-top: 4px;
        }
        button:active { background: var(--accent); color: #000; border-color: var(--accent); }

        .card {
            background: var(--card-bg); margin: 10px 0; padding: 14px; border: 1px solid var(--border);
            border-radius: var(--radius); line-height: 1.6; word-break: break-word; position: relative;
            transition: transform 0.2s, box-shadow 0.2s; box-shadow: var(--shadow); overflow: hidden;
        }
        .card.pinned::before { content: "📌"; position: absolute; top: 6px; right: 10px; font-size: 14px; }
        .card.favorite::after { content: "⭐"; position: absolute; top: 6px; left: 10px; font-size: 14px; }
        .card b { font-size: 17px; color: var(--accent); display: block; margin-bottom: 4px; }
        .card .meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
        .card .content-text { color: var(--text); font-size: 14px; margin: 6px 0; white-space: pre-wrap; line-height: 1.5; }
        .card .tag {
            display: ; padding: 2px 10px; border-radius: 12px; font-size: 11px; margin-right: 4px;
            border: 1px solid; background: var(--accent-dim);
        }
        .card .btn-group { display: flex; gap: 6px; margin-top: 8px; }
        .card .btn-group button { flex: 1; padding: 6px; font-size: 13px; }

        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent);
            color: #000; padding: 10px 22px; border-radius: 20px; font-weight: 700; font-size: 14px;
            z-index: 200; opacity: 0; transition: opacity 0.35s; pointer-events: none; box-shadow: 0 4px 16px rgba(0,255,0,0.3);
        }
        .toast.show { opacity: 1; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state::before { content: "📭"; display: block; font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        .stat-card {
            background: var(--card-bg); padding: 16px; border-radius: var(--radius); margin: 8px 0;
            border: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .stat-card h3 { margin-bottom: 8px; color: var(--accent); }
        .stat-row { display: flex; justify-content: space-between; padding: 6px 0; }
        canvas { display: block; margin: 0 auto; max-width: 100%; }

        .checkbox-col { display: none; align-items: center; padding: 6px; }
        .batch-mode .checkbox-col { display: flex; }
        .batch-mode .card .btn-group { display: none; }
        .card img {
    max-width: 100%;
    height: auto;
    max-height: 200px;  /* 限制最大高度，可按喜好改 150px ~ 250px */
    display: block;
    margin-top: 8px;
    border-radius: 4px;
    border: 1px solid #333;
    object-fit: contain; /* 保持原比例，完整显示图片 */
}
    </style>
</head>
<body>

    <div id="app">
        <!-- ========== 仪表盘页 ========== -->
        <div id="dashboard" class="page show">
            <h2 style="margin:8px 0;">📊 仪表盘</h2>
            <div class="stat-card" id="dash-stats"></div>
            <div class="stat-card" id="dash-recent"><h3>🕒 最近更新</h3></div>
            <div id="storage-info" style="text-align:center;font-size:12px;color:var(--text-secondary);padding:8px;"></div>
        </div>

        <!-- ========== 列表页 ========== -->
        <div id="list-page" class="page">
            <div style="display:flex;gap:6px;margin-bottom:8px;">
                <select id="filter-category" onchange="renderList()">
                    <option value="">🗂 全部分类</option>
                </select>
                <select id="filter-special" onchange="renderList()">
                    <option value="">📌 全部</option>
                    <option value="pinned">置顶</option>
                    <option value="favorite">收藏</option>
                </select>
            </div>
            <input id="search" placeholder="🔍 搜索标题或内容..." oninput="renderList()" style="margin-bottom:8px;">
            <div style="display:flex;gap:6px;margin-bottom:8px;">
                <button id="btn-batch" onclick="toggleBatch()">☐ 批量管理</button>
                <button id="btn-del-sel" style="display:none;background:#600;color:#f66;" onclick="deleteSelected()">🗑 删除所选</button>
                <button id="btn-exp-sel" style="display:none;" onclick="exportSelected()">📤 导出所选</button>
            </div>
            <div id="card-container"></div>
        </div>

        <!-- ========== 新增/编辑页 ========== -->
        <div id="add-page" class="page">
            <h2 style="margin:8px 0;" id="form-title">➕ 新增资料</h2>
            <select id="category-select">
                <option value="">📂 选择分类（可选）</option>
            </select>
            <input id="title-input" placeholder="📝 标题" maxlength="200">
            <textarea id="content-input" placeholder="📄 详细内容..." rows="6"></textarea>
            
           <!-- 多图片上传 -->
<input type="file" id="img-files" accept="image/*" multiple onchange="previewMultiImages()">
<div id="multi-image-preview" class="media-preview-area" style="display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; padding:8px; border:1px dashed var(--border); border-radius:8px; min-height:80px;"></div>

<!-- 多视频上传 -->
<input type="file" id="video-files" accept="video/*" multiple onchange="previewMultiVideos()">
<div id="multi-video-preview" class="media-preview-area" style="display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; padding:8px; border:1px dashed var(--border); border-radius:8px; min-height:80px;"></div>
            <button id="btn-save" onclick="saveItem()">💾 保存</button>
            <button style="background:#222;color:#aaa;" onclick="cancelEdit()">↩ 取消</button>
        </div>
            <!-- ========== 统计页 ========== -->
        <div id="stats-page" class="page">
            <h2 style="margin:8px 0;">📈 统计面板</h2>
            <div class="stat-card" id="stats-summary"></div>
            <div class="stat-card">
                <h3>📊 分类分布</h3>
                <canvas id="category-chart" width="200" height="200"></canvas>
                <div id="category-legend" style="margin-top:8px;"></div>
            </div>
        </div>

        <!-- ========== 设置页 ========== -->
        <div id="settings-page" class="page">
            <h2 style="margin:8px 0;">⚙️ 设置</h2>
            <button onclick="toggleTheme()">🌓 切换主题 (当前: <span id="theme-label">深色</span>)</button>
            <button onclick="exportAll()">📤 导出完整备份</button>
            <button onclick="document.getElementById('import-file').click()">📥 导入备份</button>
            <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importBackup()">
            <button style="background:#600;color:#f66;" onclick="clearAllData()">⚠️ 清空所有数据</button>
            <div class="stat-card" style="margin-top:16px;">
                <p>ℹ️ 蛊真人资料库 v2.0</p>
                <p>数据完全存储在本地，离线可用。</p>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div id="bottom-nav">
        <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')"><span>📊</span>仪表盘</div>
        <div class="nav-item" data-page="list-page" onclick="switchPage('list-page')"><span>📋</span>列表</div>
        <div class="nav-item" data-page="add-page" onclick="switchPage('add-page')"><span>➕</span>新增</div>
        <div class="nav-item" data-page="stats-page" onclick="switchPage('stats-page')"><span>📈</span>统计</div>
        <div class="nav-item" data-page="settings-page" onclick="switchPage('settings-page')"><span>⚙️</span>设置</div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
    alert('脚本启动正常');
        // ==================== 全局变量与分类定义 ====================     
        var db;
        // 编辑时用于保存已有的媒体ID列表
var existingImgIds = [];     // 编辑状态下原始图片ID数组
var existingVideoIds = [];   // 编辑状态下原始视频ID数组
// 临时存储待上传的文件列表（用于预览和增量管理）
var pendingImageFiles = [];   // 新增的图片文件（File对象数组）
var pendingVideoFiles = [];   // 新增的视频文件
// 待删除的媒体ID（编辑时用户删除了旧媒体）
var toDeleteImgIds = [];
var toDeleteVideoIds = [];
        var _editingImgId = null;
        var currentPage = 'dashboard';
        var editingId = null;         // 当前编辑的条目ID
        var editingVideoId = null;       
        var batchMode = false;
        var selectedIds = {};
        var CATEGORIES = [
            { name: '人物', color: '#f44' },
            { name: '功法', color: '#4af' },
            { name: '地点', color: '#fa0' },
            { name: '事件', color: '#0af' },
            { name: '物品', color: '#a4f' },
            { name: '秘籍', color: '#ff0' },
            { name: '门派', color: '#f0f' },
            { name: '其他', color: '#aaa' }
        ];
        var categoryColors = {};
        CATEGORIES.forEach(function(c) { categoryColors[c.name] = c.color; });
       // ==================== 数据库初始化 ====================
var openReq = indexedDB.open('gu_master_db', 2);
openReq.onupgradeneeded = function(e) {
    var db = e.target.result;
    var oldVersion = e.oldVersion;
    var upgradeTx = e.target.transaction;
    
    if (!db.objectStoreNames.contains('items')) {
        var itemStore = db.createObjectStore('items', { keyPath: 'id', autoIncrement: true });
        itemStore.createIndex('category', 'category', { unique: false });
        itemStore.createIndex('pinned', 'pinned', { unique: false });
        itemStore.createIndex('favorite', 'favorite', { unique: false });
    }
    
    if (oldVersion < 2) {
        var store = upgradeTx.objectStore('items');
        store.openCursor().onsuccess = function(ev) {
            var cursor = ev.target.result;
            if (cursor) {
                var record = cursor.value;
                var needUpdate = false;
                if (record.imgId !== undefined && !record.imgIds) {
                    record.imgIds = record.imgId ? [record.imgId] : [];
                    delete record.imgId;
                    needUpdate = true;
                }
                if (record.videoId !== undefined && !record.videoIds) {
                    record.videoIds = record.videoId ? [record.videoId] : [];
                    delete record.videoId;
                    needUpdate = true;
                }
                if (needUpdate) {
                    store.put(record);
                }
                cursor.continue();
            }
        };
    }
    
    if (!db.objectStoreNames.contains('images')) {
        db.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
    }
};

openReq.onsuccess = function(e) {
    db = e.target.result;
    console.log('数据库已就绪');
    loadTheme();
    initCategorySelects();
    switchPage('dashboard');
};

openReq.onerror = function(e) {
    console.error('数据库打开失败', e.target.error);
    showToast('⚠️ 数据库打开失败，请刷新页面重试');
};

// ==================== 工具函数 ====================

        // ==================== 工具函数 ====================
        function showToast(msg, duration) {
            duration = duration || 1800;
            var toast = document.getElementById('toast');
            if (toast._timer) clearTimeout(toast._timer);
            toast.textContent = msg;
            toast.classList.add('show');
            toast._timer = setTimeout(function() { toast.classList.remove('show'); }, duration);
        }

        function formatTime(ts) {
            if (!ts) return '';
            var d = new Date(ts);
            return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
        }

        // ==================== 主题 ====================
        function loadTheme() {
            var theme = localStorage.getItem('gu_theme');
            if (theme === 'light') {
                document.body.classList.add('light');
                document.getElementById('theme-label').textContent = '浅色';
            } else {
                document.body.classList.remove('light');
                document.getElementById('theme-label').textContent = '深色';
            }
        }
        function toggleTheme() {
            if (document.body.classList.contains('light')) {
                document.body.classList.remove('light');
                localStorage.setItem('gu_theme', 'dark');
                document.getElementById('theme-label').textContent = '深色';
            } else {
                document.body.classList.add('light');
                localStorage.setItem('gu_theme', 'light');
                document.getElementById('theme-label').textContent = '浅色';
            }
        }
        // ==================== 页面切换 ====================
        function switchPage(pageName) {
            var pages = document.getElementsByClassName('page');
            for (var i = 0; i < pages.length; i++) pages[i].classList.remove('show');
            document.getElementById(pageName).classList.add('show');
            var navItems = document.querySelectorAll('#bottom-nav .nav-item');
            for (var j = 0; j < navItems.length; j++) {
                navItems[j].classList.remove('active');
                if (navItems[j].getAttribute('data-page') === pageName) navItems[j].classList.add('active');
            }
            currentPage = pageName;
            if (pageName === 'dashboard') refreshDashboard();
            else if (pageName === 'list-page') renderList();
            else if (pageName === 'add-page') {
    if (!editingId) resetMultiForm();   
}
            else if (pageName === 'stats-page') refreshStats();
        }

        // ==================== 分类下拉框初始化 ====================
        function initCategorySelects() {
            var selects = [document.getElementById('filter-category'), document.getElementById('category-select')];
            selects.forEach(function(sel) {
                if (!sel) return;
                sel.innerHTML = '<option value="">🗂 全部分类</option>';
                CATEGORIES.forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c.name;
                    opt.textContent = c.name;
                    sel.appendChild(opt);
                });
            });
        }

        // ==================== 图片压缩 ====================
        function compressImage(file, maxWidth, quality, callback) {
            maxWidth = maxWidth || 800;
            quality = quality || 0.7;
            if (!file || !file.type.match(/image\//)) {
                callback(file);
                return;
            }
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var w = img.width, h = img.height;
                    if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
                    canvas.width = w; canvas.height = h;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    canvas.toBlob(function(blob) {
                        callback(blob || file);
                    }, 'image/jpeg', quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        

        // ==================== 保存 / 更新 ====================
       function saveItem() {
    if (!db) {
        showToast('数据库未就绪，请稍后再试');
        return;
    }
    var title = document.getElementById('title-input').value.trim();
    var content = document.getElementById('content-input').value.trim();
    var category = document.getElementById('category-select').value;
    var btn = document.getElementById('btn-save');
    
    if (!title && !content && pendingImageFiles.length === 0 && pendingVideoFiles.length === 0 && existingImgIds.length === 0 && existingVideoIds.length === 0) {
        showToast('请填写内容或上传媒体'); return;
    }
    btn.disabled = true; btn.textContent = '⏳ 保存中...';
    
    // 辅助函数：存储新文件到 images store，返回 Promise<ids[]>
    function storeNewFiles(files) {
        return new Promise(function(resolve) {
            if (!files.length) { resolve([]); return; }
            var tx = db.transaction('images', 'readwrite');
            var store = tx.objectStore('images');
            var ids = [];
            var completed = 0;
            files.forEach(function(file) {
                var req = store.add({ blob: file, type: file.type });
                req.onsuccess = function(e) {
                    ids.push(e.target.result);
                    completed++;
                    if (completed === files.length) resolve(ids);
                };
                req.onerror = function() { completed++; if (completed === files.length) resolve(ids); };
            });
        });
    }
    
    // 辅助函数：删除待删除的媒体
    function deleteMarkedMedia(ids) {
        if (!ids.length) return Promise.resolve();
        var tx = db.transaction('images', 'readwrite');
        var store = tx.objectStore('images');
        ids.forEach(function(id) { store.delete(id); });
        return new Promise(function(resolve) { tx.oncomplete = resolve; });
    }
    
    Promise.all([
        storeNewFiles(pendingImageFiles),
        storeNewFiles(pendingVideoFiles)
    ]).then(function(results) {
        var newImgIds = results[0];
        var newVideoIds = results[1];
        // 合并已有的（未被删除）和新存储的
        var finalImgIds = existingImgIds.concat(newImgIds);
        var finalVideoIds = existingVideoIds.concat(newVideoIds);
        
        // 先删除标记删除的媒体
        return deleteMarkedMedia(toDeleteImgIds.concat(toDeleteVideoIds)).then(function() {
            return { finalImgIds: finalImgIds, finalVideoIds: finalVideoIds };
        });
    }).then(function(media) {
        var finalImgIds = media.finalImgIds;
        var finalVideoIds = media.finalVideoIds;
        
        var tx = db.transaction('items', 'readwrite');
        var store = tx.objectStore('items');
        if (editingId) {
            var getReq = store.get(editingId);
            getReq.onsuccess = function(e) {
                var record = e.target.result;
                if (record) {
                    record.title = title || '无标题';
                    record.content = content;
                    record.category = category;
                    record.imgIds = finalImgIds;
                    record.videoIds = finalVideoIds;
                    record.modifiedAt = Date.now();
                    store.put(record);
                }
            };
        } else {
            store.add({
                title: title || '无标题',
                content: content,
                category: category,
                imgIds: finalImgIds,
                videoIds: finalVideoIds,
                pinned: false,
                favorite: false,
                createdAt: Date.now(),
                modifiedAt: Date.now()
            });
        }
        tx.oncomplete = function() {
            resetMultiForm();
            showToast('✅ 保存成功');
            btn.disabled = false; btn.textContent = '💾 保存';
            if (currentPage === 'list-page') renderList();
            else if (currentPage === 'dashboard') refreshDashboard();
        };
        tx.onerror = function() {
            showToast('❌ 保存失败');
            btn.disabled = false;
        };
    }).catch(function(err) {
        console.error(err);
        showToast('❌ 保存出错');
        btn.disabled = false;
    });
}

function resetMultiForm() {
    editingId = null;
    existingImgIds = [];
    existingVideoIds = [];
    pendingImageFiles = [];
    pendingVideoFiles = [];
    toDeleteImgIds = [];
    toDeleteVideoIds = [];
    document.getElementById('title-input').value = '';
    document.getElementById('content-input').value = '';
    document.getElementById('category-select').value = '';
    document.getElementById('img-files').value = '';
    document.getElementById('video-files').value = '';
    document.getElementById('multi-image-preview').innerHTML = '';
    document.getElementById('multi-video-preview').innerHTML = '';
    document.getElementById('form-title').textContent = '➕ 新增资料';
    document.getElementById('btn-save').textContent = '💾 保存';
}
function editItem(id) {
    var tx = db.transaction('items', 'readonly');
    var req = tx.objectStore('items').get(id);
    req.onsuccess = function(e) {
        var item = e.target.result;
        if (!item) return;
        // 回填文本

        function exportItemsByIds(ids, label) {
    var tx = db.transaction(['items','images'],'readonly');
    var items = [];
    var tasks = [];
    var store = tx.objectStore('items');
    var imgStore = tx.objectStore('images');

    var cursorReq = store.openCursor();
    cursorReq.onsuccess = function(e) {
        var cursor = e.target.result;
        if (cursor) {
            if (!ids || ids.indexOf(cursor.key.toString()) !== -1) {
                var d = cursor.value;
                var item = {
                    title: d.title,
                    content: d.content,
                    category: d.category,
                    pinned: d.pinned,
                    favorite: d.favorite,
                    createdAt: d.createdAt,
                    modifiedAt: d.modifiedAt,
                    imgIds: d.imgIds || [],
                    videoIds: d.videoIds || []
                };
                items.push(item);  // ★ 必须添加

                // 处理图片
                if (d.imgIds && d.imgIds.length) {
                    d.imgIds.forEach(function(imgId) {
                        tasks.push(new Promise(function(resolve) {
                            imgStore.get(imgId).onsuccess = function(ev) {
                                var rec = ev.target.result;
                                if (rec && rec.blob) {
                                    var reader = new FileReader();
                                    reader.onloadend = function() {
                                        if (!item._imageDataList) item._imageDataList = [];
                                        item._imageDataList.push({ id: imgId, data: reader.result });
                                        resolve();
                                    };
                                    reader.readAsDataURL(rec.blob);
                                } else resolve();
                            };
                        }));
                    });
                }
                // 处理视频（★ 补充完整）
                if (d.videoIds && d.videoIds.length) {
                    d.videoIds.forEach(function(videoId) {
                        tasks.push(new Promise(function(resolve) {
                            imgStore.get(videoId).onsuccess = function(ev) {
                                var rec = ev.target.result;
                                if (rec && rec.blob) {
                                    var reader = new FileReader();
                                    reader.onloadend = function() {
                                        if (!item._videoDataList) item._videoDataList = [];
                                        item._videoDataList.push({ id: videoId, data: reader.result });
                                        resolve();
                                    };
                                    reader.readAsDataURL(rec.blob);
                                } else resolve();
                            };
                        }));
                    });
                }
            }
            cursor.continue();
        } else {
            Promise.all(tasks).then(function() {
                var blob = new Blob([JSON.stringify(items)], {type:'application/json'});
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = '蛊真人备份_'+new Date().toISOString().slice(0,10)+'.json';
                a.click();
                URL.revokeObjectURL(url);
                showToast('✅ '+label+'已下载');
            });
        }
    };
}

        function importBackup() {
            var file = document.getElementById('import-file').files[0];
            if (!file) return;
            if (!confirm('导入会清空现有所有数据，确定继续？')) { document.getElementById('import-file').value=''; return; }
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    var tx = db.transaction(['items','images'],'readwrite');
                    var itemStore = tx.objectStore('items');
                    var imgStore = tx.objectStore('images');
                    itemStore.clear();
                    imgStore.clear();
                    data.forEach(function(item) {
                        var newImgId = null;
                        if (item._imageData) {
                            var blob = dataURLtoBlob(item._imageData);
                            var imgReq = imgStore.add({ blob: blob, type: 'image/jpeg' });
                            imgReq.onsuccess = function(ev) { newImgId = ev.target.result; };
                        }
                        itemStore.add({
                            title: item.title, content: item.content, category: item.category,
                            pinned: item.pinned || false, favorite: item.favorite || false,
                            createdAt: item.createdAt, modifiedAt: item.modifiedAt, imgId: newImgId
                        });
                    });
                    tx.oncomplete = function() {
                        document.getElementById('import-file').value='';
                        showToast('✅ 导入成功');
                        if (currentPage === 'list-page') renderList();
                    };
                } catch (ex) { showToast('❌ 文件格式错误'); }
            };
            reader.readAsText(file);
        }

        function dataURLtoBlob(dataurl) {
            var parts = dataurl.split(','), mime = parts[0].match(/:(.*?);/)[1];
            var raw = atob(parts[1]), n = raw.length;
            var u8arr = new Uint8Array(n);
            for (var i=0; i<n; i++) u8arr[i] = raw.charCodeAt(i);
            return new Blob([u8arr], {type: mime});
        }

            if (!confirm('再次确认：所有数据将永久删除！')) return;
            var tx = db.transaction(['items','images'],'readwrite');
            tx.objectStore('items').clear();
            tx.objectStore('images').clear();
            tx.oncomplete = function() {
                showToast('🗑 已清空所有数据');
                if (currentPage === 'list-page' || currentPage === 'dashboard') switchPage(currentPage);
            };
        }

        function refreshDashboard() {
            if (!db) return;
            var statsDiv = document.getElementById('dash-stats');
            var recentDiv = document.getElementById('dash-recent');
            var storageInfo = document.getElementById('storage-info');

            var tx = db.transaction('items','readonly');
            var store = tx.objectStore('items');
            var total = 0, pinned = 0, favorite = 0, recentItems = [];

            store.openCursor(null, 'prev').onsuccess = function(e) {
                var cursor = e.target.result;
                if (cursor) {
                    var d = cursor.value;
                    total++;
                    if (d.pinned) pinned++;
                    if (d.favorite) favorite++;
                    if (recentItems.length < 3) recentItems.push(d);
                    cursor.continue();
                } else {
                    statsDiv.innerHTML = '<div style="display:flex;justify-content:space-around;text-align:center;">'+
                        '<div><h2>'+total+'</h2><small>总记录</small></div>'+
                        '<div><h2>'+pinned+'</h2><small>📌置顶</small></div>'+
                        '<div><h2>'+favorite+'</h2><small>⭐收藏</small></div></div>';
                    recentDiv.innerHTML = '<h3>🕒 最近更新</h3>';
                    if (recentItems.length === 0) recentDiv.innerHTML += '<p style="color:var(--text-secondary)">暂无记录</p>';
                    else recentItems.forEach(function(d) {
                        var p = document.createElement('p');
                        p.style.fontSize='14px';
                        p.textContent = '• ' + (d.title || '无标题') + ' (' + formatTime(d.modifiedAt||d.createdAt) + ')';
                        recentDiv.appendChild(p);
                    });
                }
            };

            if (navigator.storage && navigator.storage.estimate) {
                navigator.storage.estimate().then(function(est) {
                    storageInfo.textContent = '💾 已用 '+(est.usage/1024/1024).toFixed(2)+' MB / 可用 '+(est.quota/1024/1024).toFixed(2)+' MB';
                });
            }
        }

        // ==================== 统计页 ====================
        function refreshStats() {
            if (!db) return;
            var tx = db.transaction('items','readonly');
            var store = tx.objectStore('items');
            var cats = {};
            var total = 0;
            store.openCursor().onsuccess = function(e) {
                var cursor = e.target.result;
                if (cursor) {
                    var cat = cursor.value.category || '未分类';
                    cats[cat] = (cats[cat] || 0) + 1;
                    total++;
                    cursor.continue();
                } else {
                    var summaryDiv = document.getElementById('stats-summary');
                    summaryDiv.innerHTML = '<h3>📋 总记录：'+total+'</h3>';
                    drawPieChart(cats);
                    var legend = document.getElementById('category-legend');
                    legend.innerHTML = '';
                    for (var cat in cats) {
                        var color = categoryColors[cat] || '#aaa';
                        legend.innerHTML += '<div style="display:inline-block;margin:4px 8px;"><span style="display:inline-block;width:12px;height:12px;background:'+color+';border-radius:50%;margin-right:4px;"></span>'+cat+': '+cats[cat]+'</div>';
                    }
                }
            };
        }

        function drawPieChart(cats) {
            var canvas = document.getElementById('category-chart');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var w = canvas.width, h = canvas.height;
            ctx.clearRect(0,0,w,h);
            var total = 0;
            for (var k in cats) total += cats[k];
            if (total === 0) return;
            var startAngle = -Math.PI/2;
            for (var k in cats) {
                var sliceAngle = (cats[k] / total) * 2 * Math.PI;
                ctx.beginPath();
                ctx.moveTo(w/2, h/2);
                ctx.arc(w/2, h/2, w/2-10, startAngle, startAngle+sliceAngle);
                ctx.closePath();
                ctx.fillStyle = categoryColors[k] || '#aaa';
                ctx.fill();
                ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--bg').trim();
                ctx.lineWidth = 2;
                ctx.stroke();
                startAngle += sliceAngle;
            }
        }

        // ==================== 初始化 ====================
        // 主题标签初始化
        document.getElementById('theme-label').textContent = localStorage.getItem('gu_theme')==='light' ? '浅色' : '深色';
    </script>
</body>
</html>
